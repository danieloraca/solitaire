<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rust Solitaire</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <header class="bar">
        <div>
          <h1>Rust Solitaire</h1>
          <p id="status">Loading WASM...</p>
        </div>
        <div class="controls">
          <button id="undo" type="button" aria-label="Undo the last move" disabled>
            Undo
          </button>
          <button id="new-game" type="button" aria-label="Start a new shuffled game">
            New Game
          </button>
        </div>
      </header>
      <canvas id="game" width="1100" height="780" aria-label="Klondike solitaire board"></canvas>
      <section class="leaderboard" aria-labelledby="leaderboard-title">
        <h2 id="leaderboard-title">Best Scores</h2>
        <ol id="leaderboard" class="leaderboard-list"></ol>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
